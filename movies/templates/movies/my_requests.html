{% extends 'base.html' %}
{% block content %}

<h2>Request a Movie</h2>
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit" class="btn btn-primary">Submit</button>
</form>

<hr>

<h2>My Movie Requests</h2>
<ul>
  {% for req in requests_list %}
    <li>
      <strong>{{ req.title }}</strong> - {{ req.description }}
      <a href="{% url 'delete_request' req.id %}" class="btn btn-danger btn-sm">Delete</a>
    </li>
  {% empty %}
    <li>No requests yet.</li>
  {% endfor %}
</ul>

{% endblock %}
